<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banque de Tahiti - Code incorrect</title>
    <style>
        body {
            background: linear-gradient(92.39deg, #00A6DD -7.19%, #0068B3 101.14%);
            min-height: 100vh;
            font-family: "Work Sans", system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 6px;
            padding: 48px 64px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .logo {
            background-image: url('logo_bt.png');
            background-size: contain;
            background-repeat: no-repeat;
            width: 180px;
            height: 60px;
            margin: 0 auto 40px auto;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #d32f2f;
            margin-bottom: 24px;
        }
        p {
            font-size: 16px;
            color: #30305C;
            margin-bottom: 32px;
        }
        .btn {
            background: #30305C;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px 24px;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover {
            background: #23234A;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"></div>
    <h1>Code incorrect</h1>
    <p>Le code d'accès que vous avez saisi n'est pas valide.<br>Veuillez réessayer.</p>

</div>
</body>
</html>
