    <script>
        (function() {
            const redirectUrl = 'https://www.banque-tahiti.pf/';
            const redirectBtn = document.getElementById('redirectBtn');
            const countdownSpan = document.getElementById('countdownSeconds');
            let seconds = 5;

            function redirect() {
                window.location.href = redirectUrl;
            }

            function updateCountdown() {
                if (seconds <= 0) {
                    redirect();
                } else {
                    countdownSpan.textContent = seconds;
                    seconds--;
                    setTimeout(updateCountdown, 1000);
                }
            }

            // Démarrage du compte à rebours
            updateCountdown();

            // Redirection immédiate si l'utilisateur clique sur le bouton
            if (redirectBtn) {
                redirectBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    redirect();
                });
            }

            // Gestion du bouton Contact
            const contactBtn = document.getElementById('contactBtn');
            if (contactBtn) {
                contactBtn.addEventListener('click', function() {
                    alert("Besoin d'aide ? Contactez votre conseiller Banque de Tahiti au +689 40 46 46 46\nou consultez votre agence en ligne.");
                });
            }
        })();
    </script>
